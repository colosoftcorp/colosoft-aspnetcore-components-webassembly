name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore .\Colosoft.AspNetCore.Components.WebAssembly.slnx
    - name: Build
      run: dotnet build .\Colosoft.AspNetCore.Components.WebAssembly.slnx --no-restore